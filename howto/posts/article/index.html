<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>ノウハウ記事一覧 | Howto BOX</title>
    <meta name="description" content="EC物販・マーケティング・Webデザインに関する実践的なノウハウを発信しています。">
    
    <!-- CSS -->
    <link rel="stylesheet" href="/assets/css/template.css">
    <link rel="stylesheet" href="/assets/css/header.css">
    <link rel="stylesheet" href="/assets/css/howto.css">
    <link rel="stylesheet" href="/assets/css/article-unified.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.1/css/all.min.css">
    
    <!-- JS -->
    <script src="/assets/js/template.js" defer></script>
    
    <style>
        .hero-section {
            background-image: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url('/assets/images/howto/hero-bg.jpg');
            background-size: cover;
            background-position: center;
            padding: 100px 0;
            text-align: center;
            color: #fff;
        }
        
        .hero-title {
            font-size: 2.5rem;
            margin-bottom: 20px;
        }
        
        .hero-subtitle {
            font-size: 1.2rem;
            max-width: 800px;
            margin: 0 auto;
        }
        
        .articles-section {
            padding: 60px 0;
        }
        
        .category-nav {
            display: flex;
            justify-content: center;
            margin-bottom: 40px;
            gap: 20px;
        }
        
        .category-nav-item {
            padding: 10px 20px;
            border-radius: 30px;
            background-color: #f5f5f5;
            text-decoration: none;
            color: #333;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        .category-nav-item.active {
            background-color: #007bff;
            color: #fff;
        }
        
        .category-nav-item:hover {
            background-color: #e0e0e0;
            transform: translateY(-2px);
        }
        
        .category-nav-item.active:hover {
            background-color: #0069d9;
        }
        
        .filter-container {
            margin-bottom: 30px;
        }
        
        .filter-container h3 {
            margin-bottom: 15px;
        }
        
        .filter-options {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .filter-tag {
            padding: 5px 15px;
            border-radius: 20px;
            background-color: #f0f0f0;
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
        }
        
        .filter-tag.active {
            background-color: #28a745;
            color: #fff;
        }
        
        .filter-tag:hover {
            background-color: #e0e0e0;
        }
        
        .filter-tag.active:hover {
            background-color: #218838;
        }
        
        .articles-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
        }
        
        .article-card {
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            transition: all 0.3s;
        }
        
        .article-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
        }
        
        .article-image-container {
            height: 200px;
            overflow: hidden;
            position: relative;
        }
        
        .article-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s;
        }
        
        .article-card:hover .article-image {
            transform: scale(1.05);
        }
        
        .article-content {
            padding: 20px;
        }
        
        .article-category {
            display: inline-block;
            background-color: #007bff;
            color: #fff;
            font-size: 0.8rem;
            padding: 3px 10px;
            border-radius: 4px;
            margin-bottom: 10px;
        }
        
        .article-title {
            font-size: 1.6rem;
            margin-bottom: 10px;
            line-height: 1.5;
            font-weight: bold;
        }
        
        .article-desc {
            color: #666;
            margin-bottom: 15px;
            font-size: 0.9rem;
            line-height: 1.5;
        }
        
        .article-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #999;
            font-size: 0.8rem;
        }
        
        .article-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-top: 15px;
        }
        
        .article-tag {
            background-color: #f0f0f0;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            color: #666;
        }
        
        .articles-loading {
            text-align: center;
            padding: 40px 0;
        }
        
        .no-articles {
            text-align: center;
            padding: 40px 0;
            color: #999;
        }
    </style>
</head>
<body>
    <header class="header">
        <!-- ヘッダー内容はテンプレートで読み込まれる -->
    </header>

    <main>
        <!-- ヒーローセクション -->
        <section class="hero-section">
            <div class="container">
                <h1 class="hero-title">ノウハウ記事一覧</h1>
                <p class="hero-subtitle">EC物販・マーケティング・Webデザインに関する実践的なノウハウを発信しています</p>
            </div>
        </section>
        
        <!-- 記事一覧セクション -->
        <section class="articles-section">
            <div class="container">
                <!-- カテゴリナビゲーション -->
                <nav class="category-nav">
                    <a href="/howto/posts/" class="category-nav-item">すべて</a>
                    <a href="/howto/posts/article/" class="category-nav-item active">ノウハウ記事</a>
                    <a href="/howto/posts/manual/" class="category-nav-item">マニュアル</a>
                </nav>
                
                <!-- フィルターオプション -->
                <div class="filter-container">
                    <h3>カテゴリー</h3>
                    <div class="filter-options" id="category-filters">
                        <span class="filter-tag active" data-filter="all">すべて</span>
                        <span class="filter-tag" data-filter="web集客">Web集客</span>
                        <span class="filter-tag" data-filter="マーケティング">マーケティング</span>
                        <span class="filter-tag" data-filter="クリエイティブ">クリエイティブ</span>
                    </div>
                </div>
                
                <!-- 記事読み込み中表示 -->
                <div id="articles-loading" class="articles-loading">
                    <i class="fas fa-spinner fa-spin fa-3x"></i>
                    <p>記事を読み込んでいます...</p>
                </div>
                
                <!-- 記事が見つからない場合 -->
                <div id="no-articles" class="no-articles" style="display: none;">
                    <p>該当する記事が見つかりませんでした。</p>
                </div>
                
                <!-- 記事グリッド（JavaScriptで動的に生成） -->
                <div id="articles-grid" class="articles-grid">
                    <!-- 記事カードはJavaScriptで動的に追加 -->
                </div>
                
            </div>
        </section>
    </main>

    <footer class="footer">
        <!-- フッター内容はテンプレートで読み込まれる -->
    </footer>
    
    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            // 記事データを保持する配列
            const articles = [];
            
            // 記事ソースの定義
            const articleSources = [
                // 既存の記事ディレクトリ（article1-6）
                {
                    type: 'numbered',
                    basePath: '/howto/posts/article/',
                    pattern: 'article',
                    count: 6,
                    category: 'article'
                }
            ];
            
            // 各記事ソースから記事を取得
            for (const source of articleSources) {
                if (source.type === 'numbered') {
                    // 連番形式の記事取得（article1, article2, ...）
                    for (let i = 1; i <= source.count; i++) {
                        const articleId = `${source.pattern}${i}`;
                        const articleUrl = `${source.basePath}${articleId}/`;
                        
                        try {
                            const articleInfo = await fetchArticleInfo(articleUrl);
                            if (articleInfo) {
                                articles.push({
                                    ...articleInfo,
                                    id: `article-${i}`,
                                    url: articleUrl,
                                    category: source.category
                                });
                            }
                        } catch (error) {
                            console.error(`記事${articleId}の情報取得に失敗しました:`, error);
                        }
                    }
                }
            }
            
            // 記事情報を取得する共通関数
            async function fetchArticleInfo(articleUrl) {
                console.log('記事取得開始:', articleUrl);
                // まずは現在の正しいパスでチェック
                try {
                    let response = await fetch(`${articleUrl}index.html`);
                    
                    // 見つからない場合は古いパス構造もチェック（移行期間中の対応）
                    if (!response.ok) {
                        console.log('新パスで見つからないため古いパスで再試行:', articleUrl);
                        const oldStyleUrl = articleUrl.replace('/posts/', '/');
                        response = await fetch(`${oldStyleUrl}index.html`);
                        
                        // それでも見つからない場合はnullを返す
                        if (!response.ok) {
                            console.log('記事が見つかりません:', articleUrl);
                            return null;
                        }
                    }
                    
                    console.log('記事ファイル取得成功:', articleUrl);
                    const html = await response.text();
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(html, 'text/html');
                    
                    // 記事情報を抽出
                    const title = doc.querySelector('.article-title')?.textContent || 'タイトルなし';
                    const description = doc.querySelector('meta[name="description"]')?.getAttribute('content') || '';
                    const date = doc.querySelector('.article-meta')?.textContent.match(/\d{4}年\d{1,2}月\d{1,2}日/)?.[0] || '';
                    
                    // サムネイル画像を取得
                    let thumbnail = '';
                    
                    // 記事IDから直接サムネイルパスを生成
                    const articleId = articleUrl.match(/article(\d+)/)?.[1];
                    if (articleId) {
                        // article1, article2はpng、article3以降はwebp
                        const extension = (articleId === '1' || articleId === '2') ? 'png' : 'webp';
                        thumbnail = `/assets/images/howto/article${articleId}_thumb.${extension}`;
                    } else {
                        // 記事内の画像を探す（フォールバック）
                        const articleImage = doc.querySelector('.article-image');
                        if (articleImage) {
                            thumbnail = articleImage.getAttribute('src');
                        } else {
                            // デフォルトサムネイル
                            thumbnail = `/assets/images/howto/default-thumb.jpg`;
                        }
                    }
                    
                    // タグを取得
                    const tags = [];
                    doc.querySelectorAll('.article-tag').forEach(tag => {
                        tags.push(tag.textContent);
                    });
                    
                    return {
                        title,
                        description,
                        date,
                        thumbnail,
                        tags
                    };
                } catch (error) {
                    console.error('記事情報の抽出に失敗しました:', articleUrl, error);
                    return null;
                }
            }
            
            try {
                // 日付の新しい順にソート
                articles.sort((a, b) => {
                    const dateA = a.date ? new Date(a.date.replace(/年|月/g, '/').replace(/日/g, '')) : new Date(0);
                    const dateB = b.date ? new Date(b.date.replace(/年|月/g, '/').replace(/日/g, '')) : new Date(0);
                    return dateB - dateA;
                });
                
                // 記事の表示
                displayArticles(articles);
                
                // フィルタリング機能を初期化
                initializeFilters();
                
            } catch (error) {
                console.error('記事一覧の処理中にエラーが発生しました:', error);
                document.getElementById('articles-loading').style.display = 'none';
                document.getElementById('no-articles').style.display = 'block';
            }
            
            // 記事を表示する関数
            function displayArticles(articlesToDisplay) {
                const articlesGrid = document.getElementById('articles-grid');
                const loadingElement = document.getElementById('articles-loading');
                const noArticlesElement = document.getElementById('no-articles');
                
                // 記事グリッドをクリア
                articlesGrid.innerHTML = '';
                
                if (articlesToDisplay.length > 0) {
                    // 記事がある場合は表示
                    articlesToDisplay.forEach(article => {
                        const articleCard = document.createElement('div');
                        articleCard.className = 'article-card';
                        articleCard.dataset.category = article.category;
                        
                        // タグ情報をdata属性に追加
                        if (article.tags && article.tags.length > 0) {
                            articleCard.dataset.tags = article.tags.join(',');
                        }
                        
                        let tagsHtml = '';
                        if (article.tags && article.tags.length > 0) {
                            tagsHtml = '<div class="article-tags">' + 
                                article.tags.map(tag => `<span class="article-tag">${tag}</span>`).join('') + 
                                '</div>';
                        }
                        
                        articleCard.innerHTML = `
                            <a href="${article.url}">
                                <div class="article-image-container">
                                    <img src="${article.thumbnail}" alt="${article.title}" class="article-image">
                                </div>
                                <div class="article-content">
                                    <span class="article-category">ノウハウ記事</span>
                                    <h3 class="article-title">${article.title}</h3>
                                    <p class="article-desc">${article.description}</p>
                                    <div class="article-meta">
                                        <span>${article.date || '日付なし'}</span>
                                    </div>
                                    ${tagsHtml}
                                </div>
                            </a>
                        `;
                        
                        articlesGrid.appendChild(articleCard);
                    });
                    
                    // 読み込み中表示を非表示
                    loadingElement.style.display = 'none';
                    // 記事グリッドを表示
                    articlesGrid.style.display = 'grid';
                    // 「記事が見つかりません」を非表示
                    noArticlesElement.style.display = 'none';
                } else {
                    // 記事がない場合
                    loadingElement.style.display = 'none';
                    articlesGrid.style.display = 'none';
                    noArticlesElement.style.display = 'block';
                }
            }
            
            // フィルタリング機能を初期化する関数
            function initializeFilters() {
                // カテゴリーフィルター
                const categoryFilters = document.querySelectorAll('#category-filters .filter-tag');
                categoryFilters.forEach(filter => {
                    filter.addEventListener('click', function() {
                        const category = this.getAttribute('data-filter');
                        
                        // アクティブクラスを切り替え
                        document.querySelectorAll('#category-filters .filter-tag').forEach(f => {
                            f.classList.remove('active');
                        });
                        this.classList.add('active');
                        
                        // 記事をフィルタリング
                        filterArticlesByTag(category);
                    });
                });
            }
            
            // タグでフィルタリングする関数
            function filterArticlesByTag(tag) {
                const articleElements = document.querySelectorAll('.article-card');
                
                if (tag === 'all') {
                    // すべて表示
                    articleElements.forEach(article => {
                        article.style.display = 'block';
                    });
                } else {
                    // 特定のタグを持つ記事のみ表示
                    articleElements.forEach(article => {
                        const articleTags = article.dataset.tags ? article.dataset.tags.split(',') : [];
                        if (articleTags.includes(tag)) {
                            article.style.display = 'block';
                        } else {
                            article.style.display = 'none';
                        }
                    });
                }
                
                // 表示される記事がない場合は「記事が見つかりません」を表示
                const visibleArticles = document.querySelectorAll('.article-card[style="display: block"]');
                if (visibleArticles.length === 0) {
                    document.getElementById('no-articles').style.display = 'block';
                } else {
                    document.getElementById('no-articles').style.display = 'none';
                }
            }
        });
    </script>
</body>
</html>
