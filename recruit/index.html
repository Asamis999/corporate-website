<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>採用情報 | 合同会社A</title>
    <meta name="description" content="合同会社Aの採用情報一覧ページ。募集中のポジションや各募集ページへのリンクを掲載しています。">
    
    <link rel="stylesheet" href="../assets/css/template.css">
    <link rel="stylesheet" href="../assets/css/header.css">
    <link rel="stylesheet" href="../assets/css/footer.css">
    <link rel="stylesheet" href="../assets/css/recruit.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" integrity="sha384-3B6NwesSXE7YJlcLI9RpRqGf2p/EgVH8BgoKTaUrmKNDkHPStTQ3EyoYjCGXaOTS" crossorigin="anonymous">
    
    <script src="../assets/js/template.js" defer></script>
    <script src="../assets/js/recruit.js" defer></script>
</head>
<body>
    <!-- 共通ヘッダー -->
    <div id="site-header"></div>

    <!-- 共通パンくずリスト -->
    <div id="breadcrumb-container" data-page="recruit"></div>

    <!-- ヒーローセクション -->
    <section class="hero">
        <div class="hero-content">
            <div class="hero-label">採用情報</div>
            <h1>募集中のポジション</h1>
            <p>各募集ページはこちらからご覧いただけます。</p>
        </div>
    </section>

    <!-- 募集一覧 -->
    <section>
        <div class="container">
            <h2 class="section-title">採用情報一覧</h2>
            <p class="section-subtitle">気になる募集ページから<br>ご応募・お問い合わせください。</p>

            <div class="environment-grid">
                <a class="env-card" href="/recruit/new-graduate/" style="text-decoration: none; color: inherit;">
                    <h4>新卒採用<br>プロジェクトマネージャー候補</h4>
                    <p>第１期生として"社長の右腕"に成長する人材を募集します。</p>
                </a>

                <a class="env-card" href="/recruit/figma-designer/" style="text-decoration: none; color: inherit;">
                    <h4>デザイナー募集<br>（Figma / LP・広告バナー）</h4>
                    <p>AI活用前提の制作を学びながら、成果につながるクリエイティブ制作に取り組める環境です。</p>
                </a>

                <a class="env-card" href="/recruit/ai-generation/" style="text-decoration: none; color: inherit;">
                    <h4>AI画像生成<br>制作スタッフ募集</h4>
                    <p>AIを活用した元素材づくりや、広告・LP用バナー制作を担当するスタッフを募集します。</p>
                </a>
            </div>
        </div>
    </section>

    <!-- 共通フッター -->
    <div id="site-footer"></div>
</body>
</html>
