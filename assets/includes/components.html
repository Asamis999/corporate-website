<!-- 
  共通UIコンポーネントテンプレート
  このファイルには、サイト全体で使用される共通UIコンポーネントの

<!-- 1. ヒーローセクション -->
<template id="template-hero-section">
  <section class="page-header">
    <div class="container">
      <h1 class="page-title">ページタイトル</h1>
      <p class="page-description">ページの簡単な説明文をここに入力します。<br>必要に応じて2行に分けることも可能です。</p>
    </div>
  </section>
</template>

<!-- 2. CTAボタンセクション -->
<template id="template-cta-section">
  <section class="cta-block" style="background-color: #f8f9fa; padding: 60px 0 80px;">
    <div class="container text-center">
      <h2 style="text-align: center; margin-bottom: 25px;">プロジェクトについて、ご質問がありませんか？</h2>
      <p style="text-align: center;">さらに詳しい情報や個別のご相談も承っております。<br>まずはお気軽にお問い合わせください。</p>
      <div class="text-center mt-40">
        <div style="max-width: 300px; margin: 0 auto;">
          <a href="#" class="btn btn-primary cta-button">お見積り依頼</a>
        </div>
        <p class="small-note text-center mt-10">無料相談・お問い合わせもこちら</p>
      </div>
    </div>
  </section>
</template>

<!-- 8. よくある質問（FAQ） -->
<template id="template-faq">
  <section class="faq-section">
    <div class="container">
      <div class="section-header">
        <h2 class="section-title">よくある質問</h2>
      </div>
      
      <div class="faq-list">
        <div class="faq-item">
          <div class="faq-question">
            <h3>質問1のタイトル</h3>
            <span class="toggle-icon">+</span>
          </div>
          <div class="faq-answer">
            <p>質問1の回答内容をここに記述します。</p>
          </div>
        </div>
        
        <div class="faq-item">
          <div class="faq-question">
            <h3>質問2のタイトル</h3>
            <span class="toggle-icon">+</span>
          </div>
          <div class="faq-answer">
            <p>質問2の回答内容をここに記述します。</p>
          </div>
        </div>
        
        <!-- 必要に応じてfaq-itemを追加 -->
      </div>
    </div>
  </section>
</template>

<!-- FAQ用JavaScriptコード -->
<script>
  // FAQアコーディオンの機能を実装するスクリプト
  function initFAQ() {
    const faqItems = document.querySelectorAll('.faq-item');
    
    faqItems.forEach(item => {
      const question = item.querySelector('.faq-question');
      
      question.addEventListener('click', () => {
        // 現在の項目の開閉状態を切り替え
        item.classList.toggle('active');
        
        // 必要に応じて、他の開いている項目を閉じる場合はコメントを解除
        // faqItems.forEach(otherItem => {
        //   if (otherItem !== item) {
        //     otherItem.classList.remove('active');
        //   }
        // });
      });
    });
  }
  
  // ページ読み込み完了時にFAQ機能を初期化
  document.addEventListener('DOMContentLoaded', initFAQ);
</script>
